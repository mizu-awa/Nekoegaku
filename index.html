<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ねこえがく</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #fdf6e3;
  color: #3c3c3c;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

#app {
  width: 900px;
  max-width: 95vw;
}

/* タイトル画面 */
#title-screen {
  text-align: center;
  animation: fadeIn 0.5s;
}

#title-screen h1 {
  font-size: 4rem;
  font-weight: 900;
  color: #e8824e;
  text-shadow: 3px 3px 0 #f5c89a;
  margin-bottom: 0.2em;
}

#title-screen .subtitle {
  font-size: 1.2rem;
  color: #888;
  margin-bottom: 2em;
}

#title-screen .title-cat {
  margin: 1em auto;
}

.btn {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  padding: 0.6em 2em;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
}

.btn:hover { transform: scale(1.05); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: #e8824e;
  color: white;
  box-shadow: 0 4px 0 #c46a3a;
}

.btn-primary:active {
  box-shadow: 0 2px 0 #c46a3a;
  margin-top: 2px;
}

/* ゲーム画面 */
#game-screen {
  display: none;
  animation: fadeIn 0.3s;
}

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5em 0;
}

.game-header h2 {
  font-size: 1.5rem;
  color: #e8824e;
}

.timer {
  font-size: 1.8rem;
  font-weight: 900;
  color: #3c3c3c;
  min-width: 140px;
  text-align: right;
}

.timer.warning { color: #e85050; }

.canvas-wrap {
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 8px;
  margin-bottom: 0.8em;
}

canvas {
  display: block;
  width: 100%;
  border-radius: 12px;
}

.sliders {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.4em 1.5em;
}

.slider-group {
  display: flex;
  align-items: center;
  gap: 0.5em;
  background: white;
  border-radius: 12px;
  padding: 0.5em 1em;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.slider-group label {
  font-size: 1.4rem;
  font-weight: 700;
  min-width: 1.8em;
  text-align: center;
  color: #555;
}

.sliders > .slider-group:last-child:nth-child(odd) {
  grid-column: 1 / -1;
  width: calc(50% - 0.75em);
  margin: 0 auto;
}

.slider-group input[type="range"] {
  flex: 1;
  accent-color: #e8824e;
  height: 6px;
}

.game-footer {
  text-align: center;
  margin-top: 0.8em;
}

/* 結果画面 */
#result-screen {
  display: none;
  text-align: center;
  animation: fadeIn 0.5s;
}

#result-screen h2 {
  font-size: 2rem;
  color: #e8824e;
  margin-bottom: 0.3em;
}

.score-display {
  font-size: 5rem;
  font-weight: 900;
  color: #3c3c3c;
  margin: 0.2em 0;
}

.score-display span {
  font-size: 2rem;
  color: #888;
}

.score-comment {
  font-size: 1.4rem;
  margin-bottom: 0.5em;
  color: #666;
}

.result-canvas-wrap {
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 8px;
  margin: 1em auto;
  max-width: 700px;
}

.result-canvas-wrap canvas {
  width: 100%;
}

.result-buttons {
  margin-top: 1em;
  display: flex;
  justify-content: center;
  gap: 1em;
}

/* 横長画面: ゲーム画面のみキャンバスとスライダーを横並び */
@media (min-aspect-ratio: 1/1) {
  #app {
    width: 95vw;
    max-width: 1400px;
  }

  #title-screen,
  #result-screen {
    max-width: 900px;
    margin: 0 auto;
  }

  .game-body {
    display: flex;
    gap: 1em;
    align-items: center;
  }

  .canvas-wrap {
    flex: 1;
    min-width: 0;
    margin-bottom: 0;
  }

  .game-side {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0.6em;
  }

  .sliders {
    grid-template-columns: 1fr;
    gap: 0.5em;
  }

  .sliders > .slider-group:last-child:nth-child(odd) {
    width: 100%;
  }

  .slider-group {
    padding: 0.35em 0.7em;
  }

  .slider-group label {
    font-size: 1.1rem;
    min-width: 1.4em;
  }

  .game-footer {
    margin-top: 0.4em;
  }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div id="app">

  <!-- タイトル画面 -->
  <div id="title-screen">
    <h1 id="title-heading"></h1>
    <p class="subtitle" id="title-subtitle"></p>
    <canvas id="title-canvas" width="800" height="400" class="title-cat"></canvas>
    <br>
    <button class="btn btn-primary" id="start-btn" onclick="startGame()"></button>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen">
    <div class="game-header">
      <h2 id="game-heading"></h2>
      <div class="timer" id="timer"></div>
    </div>
    <div class="game-body">
    <div class="canvas-wrap">
      <canvas id="game-canvas" width="800" height="400"></canvas>
    </div>
    <div class="game-side">
    <div class="sliders">
      <div class="slider-group">
        <label id="label-earHeight"></label>
        <input type="range" id="sl-earHeight">
      </div>
      <div class="slider-group">
        <label id="label-earWidth"></label>
        <input type="range" id="sl-earWidth">
      </div>
      <div class="slider-group">
        <label id="label-earGap"></label>
        <input type="range" id="sl-earGap">
      </div>
      <div class="slider-group">
        <label id="label-tailHeight"></label>
        <input type="range" id="sl-tailHeight">
      </div>
      <div class="slider-group">
        <label id="label-tailCurl"></label>
        <input type="range" id="sl-tailCurl">
      </div>
      <div class="slider-group">
        <label id="label-feetAmp"></label>
        <input type="range" id="sl-feetAmp">
      </div>
      <div class="slider-group">
        <label id="label-feetFreq"></label>
        <input type="range" id="sl-feetFreq">
      </div>
      <div class="slider-group">
        <label id="label-feetPhase"></label>
        <input type="range" id="sl-feetPhase">
      </div>
      <div class="slider-group">
        <label id="label-bodyHeight"></label>
        <input type="range" id="sl-bodyHeight">
      </div>
    </div>
    <div class="game-footer">
      <button class="btn btn-primary" id="finish-btn" onclick="finishGame()"></button>
    </div>
    </div><!-- .game-side -->
    </div><!-- .game-body -->
  </div>

  <!-- 結果画面 -->
  <div id="result-screen">
    <h2 id="result-heading"></h2>
    <div class="score-display" id="score-value"></div>
    <div class="score-comment" id="score-comment"></div>
    <div class="result-canvas-wrap">
      <canvas id="result-canvas" width="800" height="400"></canvas>
    </div>
    <div class="result-buttons">
      <button class="btn btn-primary" id="retry-btn" onclick="backToTitle()"></button>
    </div>
  </div>

</div>

<script src="js/game.js"></script>
</body>
</html>
